name: JUnit Test
on: push
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: 'temurin'
                  java-version: '17'
                  cache: maven
            - name: Run Test
              run: mvn -B test
